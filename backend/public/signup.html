<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Sign Up — DekNek 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
            display: flex; justify-content: center; align-items: center; color: #eaeaea;
        }
        .container {
            width: 360px; padding: 35px; border-radius: 16px;
            background: rgba(20,20,35,0.85); box-shadow: 0 0 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
        }
        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }
        .input-box { margin-bottom: 18px; }
        .input-box input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #0f0f1a; color: #fff; font-size: 14px; transition: 0.3s;
        }
        .input-box input::placeholder { color: #777; }
        .input-box input:focus { border-color: #7f5af0; box-shadow: 0 0 8px #7f5af0; outline: none; }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            color: white; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(127,90,240,0.5); }
        .footer-text { text-align: center; margin-top: 15px; font-size: 13px; color: #aaa; }
        .footer-text a { color: #7f5af0; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .error-msg {
            background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.4);
            color: #ff6b6b; padding: 10px 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 15px; display: none;
        }
        .success-msg {
            background: rgba(44,182,125,0.15); border: 1px solid rgba(44,182,125,0.4);
            color: #2cb67d; padding: 10px 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 15px; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <form action="/.netlify/functions/api/signup" method="POST">
            <div class="input-box">
                <input type="text" name="name" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div class="footer-text">
            Already have an account? <a href="/login.html">Login</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        if (params.get('error')) {
            errorMsg.textContent = params.get('error');
            errorMsg.style.display = 'block';
        }
        if (params.get('success')) {
            successMsg.textContent = params.get('success');
            successMsg.style.display = 'block';
        }
    </script>
</body>
</html>
