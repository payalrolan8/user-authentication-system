[build]
  functions = "backend/netlify/functions"
  publish = "backend/public"

[[redirects]]
  from = "/"
  to = "/signup.html"
  status = 302
  force = true

[[redirects]]
  from = "/signup"
  to = "/.netlify/functions/api/signup"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "/.netlify/functions/api/login"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "/.netlify/functions/api/logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true